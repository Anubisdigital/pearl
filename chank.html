<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pearl Admin | Cake Manager</title>
    <link rel="icon" href="cak.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #821415;
            --primary-dark: #5e0e10;
            --accent: #d4af37;
            --bg-dark: #0f0f0f;
            --card-bg: #1c1c1e;
            --text-light: #f5f5f5;
            --text-muted: #aaa;
            --border: #2c2c2e;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.5;
            padding: 24px;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-img {
            height: 48px;
            width: auto;
        }

        .logo-text h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.7rem;
            font-weight: 800;
            color: var(--primary);
        }

        .logo-text p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .back-link a {
            color: var(--text-light);
            background: rgba(255,255,255,0.08);
            padding: 10px 18px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-link a:hover {
            background: var(--primary);
            color: white;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            background: var(--card-bg);
            border-radius: 60px;
            padding: 6px;
            flex-wrap: wrap;
            border: 1px solid var(--border);
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
            font-family: 'Poppins', sans-serif;
        }

        .tab-btn i {
            margin-right: 8px;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(130,20,21,0.3);
        }

        .tab-content {
            display: none;
            animation: fade 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .admin-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 28px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.6rem;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid var(--accent);
            padding-left: 16px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .required:after {
            content: " *";
            color: var(--danger);
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            background: #252528;
            border: 1px solid var(--border);
            border-radius: 16px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(130,20,21,0.3);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-danger {
            background: var(--danger);
        }
        .btn-danger:hover {
            background: #c0392b;
        }

        #imagePreview {
            max-width: 100%;
            max-height: 200px;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 16px;
            margin-top: 12px;
            border: 1px solid var(--border);
            background: #0a0a0c;
            display: none;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }

        .product-card {
            background: #161618;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: 0.2s;
        }

        .product-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
        }

        .product-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #2a2a2c;
        }

        .product-info {
            padding: 18px;
        }

        .product-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 6px;
        }

        .product-price {
            color: var(--accent);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .product-cat {
            background: rgba(212,175,55,0.2);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            margin-bottom: 12px;
        }

        .product-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .product-actions {
            display: flex;
            gap: 12px;
        }

        .product-actions button {
            flex: 1;
            padding: 10px;
            justify-content: center;
            font-size: 0.8rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #161618;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-number {
            font-size: 2.4rem;
            font-weight: 800;
            color: var(--accent);
        }

        .category-badge-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }

        .category-item {
            background: #252528;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-count {
            background: var(--primary);
            border-radius: 30px;
            padding: 2px 10px;
            font-weight: 700;
        }

        .message {
            padding: 14px 18px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 12px;
        }

        .message.success {
            background: rgba(46,204,113,0.15);
            border-left: 4px solid var(--success);
            display: flex;
        }
        .message.error {
            background: rgba(231,76,60,0.15);
            border-left: 4px solid var(--danger);
            display: flex;
        }

        @media (max-width: 680px) {
            body { padding: 16px; }
            .tabs { border-radius: 20px; }
            .tab-btn { padding: 8px 16px; font-size: 0.8rem; }
            .admin-card { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="admin-header">
        <div class="logo-area">
            <img src="cak.png" alt="Pearl" class="logo-img">
            <div class="logo-text">
                <h1>Pearl <span style="color:white;">Admin</span></h1>
                <p>Manage cakes & events collection</p>
            </div>
        </div>
        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="upload"><i class="fas fa-cloud-upload-alt"></i> Upload Cake</button>
        <button class="tab-btn" data-tab="manage"><i class="fas fa-layer-group"></i> Manage Products</button>
        <button class="tab-btn" data-tab="stats"><i class="fas fa-chart-simple"></i> Statistics</button>
    </div>

    <div id="messageBox" class="message"></div>

    <!-- Upload Tab -->
    <div id="upload-tab" class="tab-content active">
        <div class="admin-card">
            <h2><i class="fas fa-cake-candles"></i> Add New Cake</h2>
            <div class="form-group">
                <label class="required">Cake Image</label>
                <input type="file" id="cakeImage" accept="image/*">
                <img id="imagePreview" src="" alt="Image preview">
            </div>
            <div class="form-group">
                <label class="required">Cake Name</label>
                <input type="text" id="cakeTitle" placeholder="e.g., Royal Wedding Pearl">
            </div>
            <div class="form-group">
                <label class="required">Price</label>
                <input type="text" id="cakePrice" placeholder="UGX 150,000 or 250k+">
            </div>
            <div class="form-group">
                <label class="required">Category</label>
                <select id="cakeCategory">
                    <option value="">-- Select Category --</option>
                    <option value="wedding">Wedding</option>
                    <option value="birthday">Birthday</option>
                    <option value="for kids">For Kids</option>
                    <option value="theme-base">Theme Base</option>
                    <option value="Baby shawer">Baby Shower</option>
                    <option value="anniversary">Anniversary</option>
                    <option value="Name & message">Name & Message</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="cakeDesc" rows="3" placeholder="Describe the cake, flavors, occasion..."></textarea>
            </div>
            <button id="uploadBtn"><i class="fas fa-upload"></i> Upload to Pearl Gallery</button>
        </div>
    </div>

    <!-- Manage Tab -->
    <div id="manage-tab" class="tab-content">
        <div class="admin-card">
            <h2><i class="fas fa-edit"></i> Manage Cakes</h2>
            <div id="productsListContainer">
                <div class="loader" style="text-align:center; padding:40px;"><i class="fas fa-spinner fa-pulse"></i> Loading products...</div>
            </div>
        </div>
    </div>

    <!-- Statistics Tab -->
    <div id="stats-tab" class="tab-content">
        <div class="admin-card">
            <h2><i class="fas fa-chart-line"></i> Inventory Stats</h2>
            <div id="statsContainer">
                <div class="loader" style="text-align:center; padding:40px;"><i class="fas fa-spinner fa-pulse"></i> Loading stats...</div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    // ========== ENVIRONMENT VARIABLES (injected via build tool like Vite) ==========
    // For Vite: import.meta.env.VITE_FIREBASE_API_KEY, etc.
    // For Node.js backend serving this HTML, you can replace these with process.env values.
    // NEVER hardcode secrets in frontend code. Use .env and a build step.
    const FIREBASE_CONFIG = {
        apiKey: import.meta.env.VITE_FIREBASE_API_KEY,
        authDomain: import.meta.env.VITE_FIREBASE_AUTH_DOMAIN,
        projectId: import.meta.env.VITE_FIREBASE_PROJECT_ID,
        storageBucket: import.meta.env.VITE_FIREBASE_STORAGE_BUCKET,
        messagingSenderId: import.meta.env.VITE_FIREBASE_MESSAGING_SENDER_ID,
        appId: import.meta.env.VITE_FIREBASE_APP_ID,
        measurementId: import.meta.env.VITE_FIREBASE_MEASUREMENT_ID
    };
    const CLOUDINARY_CLOUD_NAME = import.meta.env.VITE_CLOUDINARY_CLOUD_NAME;
    const CLOUDINARY_UPLOAD_PRESET = import.meta.env.VITE_CLOUDINARY_UPLOAD_PRESET;
    const ADMIN_KEY = import.meta.env.VITE_ADMIN_KEY;
    const COLLECTION_NAME = "glass_products";

    // Validation: if any required variable is missing, show error and block functionality.
    if (!FIREBASE_CONFIG.apiKey || !CLOUDINARY_CLOUD_NAME || !CLOUDINARY_UPLOAD_PRESET) {
        const errorDiv = document.createElement('div');
        errorDiv.className = 'message error';
        errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Missing environment variables. Please check your .env file and build setup.';
        document.querySelector('.admin-container').prepend(errorDiv);
        errorDiv.style.display = 'flex';
        throw new Error('Environment variables not properly configured');
    }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";

    const app = initializeApp(FIREBASE_CONFIG);
    const db = getFirestore(app);

    const fileInput = document.getElementById('cakeImage');
    const previewImg = document.getElementById('imagePreview');
    const titleInput = document.getElementById('cakeTitle');
    const priceInput = document.getElementById('cakePrice');
    const categorySelect = document.getElementById('cakeCategory');
    const descInput = document.getElementById('cakeDesc');
    const uploadBtn = document.getElementById('uploadBtn');
    const messageBox = document.getElementById('messageBox');

    function showMessage(text, type = 'success') {
        messageBox.className = `message ${type}`;
        messageBox.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${text}`;
        messageBox.style.display = 'flex';
        setTimeout(() => {
            messageBox.style.display = 'none';
        }, 4500);
    }

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                previewImg.src = ev.target.result;
                previewImg.style.display = 'block';
            };
            reader.readAsDataURL(file);
        } else {
            previewImg.style.display = 'none';
            previewImg.src = '';
        }
    });

    uploadBtn.addEventListener('click', async () => {
        const imageFile = fileInput.files[0];
        const title = titleInput.value.trim();
        const price = priceInput.value.trim();
        const category = categorySelect.value;
        const description = descInput.value.trim();

        if (!imageFile || !title || !price || !category) {
            showMessage("Please fill all required fields (Image, Name, Price, Category)", "error");
            return;
        }

        uploadBtn.disabled = true;
        uploadBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Uploading...';

        try {
            const formData = new FormData();
            formData.append('file', imageFile);
            formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

            const cloudRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
                method: 'POST',
                body: formData
            });
            if (!cloudRes.ok) throw new Error('Cloudinary upload failed');
            const cloudData = await cloudRes.json();
            const imageUrl = cloudData.secure_url;

            const productData = {
                title: title,
                description: description || "Delicious cake from Pearl Cakes & Events",
                price: price,
                category: category,
                image: imageUrl,
                createdAt: Date.now(),
                business: "Pearl Cakes",
                admin_key: ADMIN_KEY
            };
            await addDoc(collection(db, COLLECTION_NAME), productData);

            showMessage(`"${title}" uploaded successfully!`, "success");
            titleInput.value = '';
            priceInput.value = '';
            categorySelect.value = '';
            descInput.value = '';
            fileInput.value = '';
            previewImg.style.display = 'none';
            previewImg.src = '';

            const activeTab = document.querySelector('.tab-btn.active').getAttribute('data-tab');
            if (activeTab === 'manage') loadProducts();
            if (activeTab === 'stats') loadStatistics();
        } catch (err) {
            console.error(err);
            showMessage("Upload failed: " + err.message, "error");
        } finally {
            uploadBtn.disabled = false;
            uploadBtn.innerHTML = '<i class="fas fa-upload"></i> Upload to Pearl Gallery';
        }
    });

    async function loadProducts() {
        const container = document.getElementById('productsListContainer');
        container.innerHTML = '<div class="loader" style="text-align:center; padding:40px;"><i class="fas fa-spinner fa-pulse"></i> Fetching cakes...</div>';
        try {
            const q = query(collection(db, COLLECTION_NAME), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            if (snapshot.empty) {
                container.innerHTML = `<div style="text-align:center; padding:40px; background:#161618; border-radius:24px;"><i class="fas fa-cake-slice"></i> No cakes yet. Upload your first cake.</div>`;
                return;
            }
            let html = `<div class="products-grid">`;
            snapshot.forEach(docSnap => {
                const prod = docSnap.data();
                const id = docSnap.id;
                html += `
                    <div class="product-card" data-id="${id}">
                        <img src="${prod.image || 'cak1.jpg'}" class="product-img" onerror="this.src='cak1.jpg'">
                        <div class="product-info">
                            <div class="product-title">${escapeHtml(prod.title)}</div>
                            <div class="product-price">${escapeHtml(prod.price)}</div>
                            <div class="product-cat">${escapeHtml(prod.category)}</div>
                            <div class="product-desc">${escapeHtml(prod.description || 'No description')}</div>
                            <div class="product-actions">
                                <button class="delete-product-btn" data-id="${id}" style="background:#e74c3c;"><i class="fas fa-trash"></i> Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            container.innerHTML = html;

            document.querySelectorAll('.delete-product-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const prodId = btn.getAttribute('data-id');
                    if (confirm("Permanently delete this cake? This action cannot be undone.")) {
                        try {
                            await deleteDoc(doc(db, COLLECTION_NAME, prodId));
                            showMessage("Product deleted", "success");
                            loadProducts();
                            loadStatistics();
                        } catch (err) {
                            showMessage("Delete failed: " + err.message, "error");
                        }
                    }
                });
            });
        } catch (err) {
            container.innerHTML = `<div style="text-align:center; color:var(--danger);">Error loading: ${err.message}</div>`;
        }
    }

    async function loadStatistics() {
        const statsDiv = document.getElementById('statsContainer');
        statsDiv.innerHTML = '<div class="loader" style="text-align:center; padding:40px;"><i class="fas fa-spinner fa-pulse"></i> Calculating...</div>';
        try {
            const snapshot = await getDocs(collection(db, COLLECTION_NAME));
            const total = snapshot.size;
            const categoryMap = new Map();
            snapshot.forEach(docSnap => {
                const cat = docSnap.data().category || 'other';
                categoryMap.set(cat, (categoryMap.get(cat) || 0) + 1);
            });
            const categoriesList = Array.from(categoryMap.keys()).sort();
            let statsHtml = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-number">${total}</div><div>Total Cakes</div></div>
                    <div class="stat-card"><div class="stat-number">${categoriesList.length}</div><div>Categories Used</div></div>
                    <div class="stat-card"><div class="stat-number">${total > 0 ? 'Active' : 'Empty'}</div><div>Inventory Status</div></div>
                </div>
                <h3 style="margin-top:20px; margin-bottom:16px;">Category Breakdown</h3>
                <div class="category-badge-list">
            `;
            for (let [cat, count] of categoryMap.entries()) {
                statsHtml += `<div class="category-item"><span>${escapeHtml(cat)}</span><span class="category-count">${count}</span></div>`;
            }
            statsHtml += `</div>`;
            statsDiv.innerHTML = statsHtml;
        } catch (err) {
            statsDiv.innerHTML = `<div style="color:var(--danger);">Failed to load stats</div>`;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    const tabs = document.querySelectorAll('.tab-btn');
    const contents = document.querySelectorAll('.tab-content');
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            const targetTab = tab.getAttribute('data-tab');
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            contents.forEach(content => content.classList.remove('active'));
            document.getElementById(`${targetTab}-tab`).classList.add('active');
            if (targetTab === 'manage') loadProducts();
            if (targetTab === 'stats') loadStatistics();
        });
    });

    loadProducts();
    loadStatistics();
</script>
</body>
</html>
